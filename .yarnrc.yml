catalog:
  "@typescript/native-preview": 7.0.0-dev.20260527.2

compressionLevel: 0

defaultSemverRangePrefix: ""

enableGlobalCache: false

enableScripts: false

nmMode: hardlinks-local

nodeLinker: node-modules

npmMinimalAgeGate: 2880

npmPreapprovedPackages:
  - "@belgattitude/*"
  - "@flowblade/*"
  - "@httpx/*"
  - next
  - "@next/*"
  - "@azure/*"
  - prisma
  - postcss
  - "@prisma/*"
  - "@duckdb/*"
  - kysely
  - turbo
  - turbo-*
  - tinyexec
  - "@turbo/*"
  - typebox
  - vite
  - "@vitejs/*"
  - vitest
  - "@vitest/*"
  - hono
  - "@hono/*"
  - "@sentry/*"
  - "@sentry-internal/*"
  - storybook
  - "@storybook/*"
  - "@kubb/*"
  - esbuild
  - "@esbuild/*"
  - better-auth
  - better-call
  - "@better-auth/*"
  - "@typescript-eslint/*"
  - prettier
  - tsdown
  - rolldown-plugin-dts
  - rolldown
  - "@rolldown/*"
  - zod
  - valibot
  - "@valibot/*"
  - "@standard-schema/*"
  - "@vitest/*"
  - shadcn
  - "@oxc-project/*"
  - "@typescript/*"
  - "@logtape/*"
  - "@napi-rs/*"
  - npm-check-updates

npmPublishProvenance: true

npmRegistryServer: "https://registry.npmjs.org"

supportedArchitectures:
  cpu:
    - current
  libc:
    - current
  os:
    - current

yarnPath: .yarn/releases/yarn-4.16.0.cjs

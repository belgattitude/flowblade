name: flowblade-example-nextjs
services:
  app-alpine:
    build:
      # Start from root of the monorepo
      context: ../../../../
      dockerfile: ./examples/apps/nextjs-app/docker/Dockerfile.alpine
    restart: no
    networks:
      - flowblade-net
    ports:
      - 3000:3000

networks:
  flowblade-net:
    driver: bridge
    enable_ipv6: false
